<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireStreaks: Dragon's Ascent</title>
    <style>
        :root {
            --fire: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            --deep-fire: #800000;
            --gold: #ffd700;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Animated Fire Background */
            background: linear-gradient(-45deg, #230101, #4a0e0e, #800000, #1a0101);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.5);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .rank-tag {
            color: var(--gold);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        .hidden { display: none; }

        input {
            background: #222;
            border: 1px solid var(--gold);
            color: white;
            padding: 12px;
            width: 70%;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .btn {
            background: linear-gradient(to right, #ff4e50, #f9d423);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.1); box-shadow: 0 0 15px #f9d423; }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .level-btn {
            padding: 15px 5px;
            background: #333;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid #555;
        }

        .level-btn.unlocked { 
            background: linear-gradient(#800000, #b30000); 
            border-color: var(--gold);
        }

        .level-btn.locked { opacity: 0.4; cursor: not-allowed; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid #444;
            transition: 0.2s;
        }

        .option-btn:hover { background: rgba(255, 69, 0, 0.3); border-color: var(--gold); }
        
        #progress-bar {
            height: 10px;
            background: #222;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        #progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

    <div class="container">
        <div id="lobby">
            <h1 style="font-size: 2.5rem; margin-bottom: 5px;">🔥 FIRE STREAKS</h1>
            <p style="margin-bottom: 25px; color: #ccc;">Prove your knowledge. Become a Dragon Master.</p>
            <input type="text" id="username" placeholder="Your Warrior Name...">
            <br>
            <button class="btn" onclick="enterLobby()">Begin Quest</button>
        </div>

        <div id="level-select" class="hidden">
            <span class="rank-tag" id="user-rank">RANK: SPARK</span>
            <h2 id="welcome-msg" style="margin-top: 0;"></h2>
            <div class="grid" id="level-grid"></div>
        </div>

        <div id="quiz-screen" class="hidden">
            <div style="display:flex; justify-content: space-between; font-size: 0.9rem;">
                <span id="current-rank-display">DRAGON SLAYER</span>
                <span id="q-count">1/10</span>
            </div>
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <h3 id="question-text" style="min-height: 60px;">Question?</h3>
            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="result-screen" class="hidden">
            <h2 id="result-title">Victory!</h2>
            <p id="result-score" style="font-size: 1.5rem;"></p>
            <button class="btn" onclick="showLevelMap()">Back to Map</button>
        </div>
    </div>

    <script>
        let userName = "";
        let unlocked = 1;
        let currentLvl = 1;
        let currentQIdx = 0;
        let score = 0;

        const ranks = [
            "Spark", "Ember", "Flame", "Blaze", "Cinder Knight", 
            "Pyromancer", "Phoenix Rider", "Dragon Slayer", "Inferno Lord", "DRAGON MASTER"
        ];

        // 10 Levels x 10 Questions = 100 Questions
        const quizDatabase = {};
        for (let l = 1; l <= 10; l++) {
            quizDatabase[l] = [];
            for (let q = 1; q <= 10; q++) {
                // Harder questions logic placeholder
                const diff = l < 4 ? "Easy" : l < 8 ? "Medium" : "SUPER HARD";
                quizDatabase[l].push({
                    q: `[Lvl ${l}] ${diff} Quest #${q}: What is ${l * q} + ${l + q}?`,
                    a: [`${(l*q)+(l+q)}`, `${(l*q)+q}`, `${l+q+1}`, "None"],
                    correct: 0
                });
            }
        }

        // Specifically overwriting the "Super Hard" Level 10
        quizDatabase[10][0] = { q: "Which particle is its own antiparticle?", a: ["Electron", "Neutrino", "Photon", "Proton"], correct: 2 };
        quizDatabase[10][1] = { q: "What is the square root of 1024?", a: ["32", "28", "34", "38"], correct: 0 };

        function enterLobby() {
            userName = document.getElementById('username').value || "Unknown Warrior";
            showLevelMap();
        }

        function showLevelMap() {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('level-select').classList.remove('hidden');
            
            document.getElementById('welcome-msg').innerText = userName;
            document.getElementById('user-rank').innerText = `RANK: ${ranks[unlocked-1]}`;
            
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('div');
                btn.className = `level-btn ${i <= unlocked ? 'unlocked' : 'locked'}`;
                btn.innerHTML = `<small>${ranks[i-1]}</small><br><b>LVL ${i}</b>`;
                if (i <= unlocked) btn.onclick = () => startLevel(i);
                grid.appendChild(btn);
            }
        }

        function startLevel(lvl) {
            currentLvl = lvl;
            currentQIdx = 0;
            score = 0;
            document.getElementById('level-select').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('current-rank-display').innerText = ranks[lvl-1];
            loadQuestion();
        }

        function loadQuestion() {
            const data = quizDatabase[currentLvl][currentQIdx];
            document.getElementById('q-count').innerText = `${currentQIdx + 1}/10`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('progress-fill').style.width = `${(currentQIdx / 10) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            data.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(i);
                container.appendChild(btn);
            });
        }

        function handleAnswer(choice) {
            if (choice === quizDatabase[currentLvl][currentQIdx].correct) score++;
            currentQIdx++;
            if (currentQIdx < 10) loadQuestion();
            else finishLevel();
        }

        function finishLevel() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const passed = score >= 8; // Must get 8/10 to advance
            document.getElementById('result-score').innerText = `Score: ${score}/10`;

            if (passed) {
                document.getElementById('result-title').innerText = "🔥 ASCENDED!";
                if (currentLvl === unlocked && unlocked < 10) unlocked++;
            } else {
                document.getElementById('result-title').innerText = "💀 BURNED (Failed)";
            }
        }
    </script>
</body>
</html>
