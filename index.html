<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireStreaks Quiz</title>
    <style>
        :root {
            --primary: #ff4d00;
            --dark: #1a1a1a;
            --gray: #333;
            --light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #222;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .hidden { display: none; }

        input[type="text"] {
            padding: 10px;
            width: 80%;
            border-radius: 5px;
            border: none;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.05); }
        .btn:disabled { background: #555; cursor: not-allowed; }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .level-btn {
            padding: 15px 5px;
            background: var(--gray);
            border-radius: 8px;
            cursor: pointer;
            position: relative;
        }

        .level-btn.unlocked { background: var(--primary); }
        .level-btn.locked::after { content: '🔒'; font-size: 10px; display: block; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .option-btn {
            background: #444;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .option-btn:hover { border-color: var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <div id="lobby">
            <h1>🔥 FireStreaks</h1>
            <input type="text" id="username" placeholder="Enter Your Name">
            <br>
            <button class="btn" onclick="goToLevels()">Enter Lobby</button>
        </div>

        <div id="level-select" class="hidden">
            <h2 id="welcome-msg"></h2>
            <p>Select a Level</p>
            <div class="grid" id="level-grid"></div>
        </div>

        <div id="quiz-screen" class="hidden">
            <div id="quiz-header" style="display:flex; justify-content: space-between;">
                <span id="q-count">Question 1/10</span>
                <span id="q-level">Level 1</span>
            </div>
            <h3 id="question-text">Question goes here?</h3>
            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="result-screen" class="hidden">
            <h2 id="result-title">Level Complete!</h2>
            <p id="result-score"></p>
            <button class="btn" onclick="goToLevels()">Back to Levels</button>
        </div>
    </div>

    <script>
        let currentUser = "";
        let unlockedLevel = 1;
        let currentLevel = 1;
        let currentQuestionIdx = 0;
        let score = 0;

        // Sample Data - Extend this to Level 10
        const quizData = {
            1: [
                { q: "What is 2 + 2?", a: ["3", "4", "5", "22"], correct: 1 },
                { q: "Color of the sky?", a: ["Green", "Blue", "Red", "Yellow"], correct: 1 },
                // ... add 8 more
            ],
            2: [
                { q: "Capital of France?", a: ["London", "Berlin", "Paris", "Rome"], correct: 2 },
                { q: "Which planet is red?", a: ["Mars", "Venus", "Jupiter", "Earth"], correct: 0 },
                // ... add 8 more
            ],
            // Add levels 3-10 here
        };

        // Fill in placeholders for levels 3-10 so the logic doesn't break
        for(let i=3; i<=10; i++) {
            quizData[i] = Array(10).fill({ q: `Level ${i} Question`, a: ["A", "B", "C", "D"], correct: 0 });
        }

        function goToLevels() {
            const nameInput = document.getElementById('username').value;
            if (nameInput) currentUser = nameInput;
            
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('level-select').classList.remove('hidden');
            
            document.getElementById('welcome-msg').innerText = `Warrior: ${currentUser}`;
            renderLevels();
        }

        function renderLevels() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('div');
                btn.className = `level-btn ${i <= unlockedLevel ? 'unlocked' : 'locked'}`;
                btn.innerText = `Lvl ${i}`;
                if (i <= unlockedLevel) {
                    btn.onclick = () => startQuiz(i);
                }
                grid.appendChild(btn);
            }
        }

        function startQuiz(lvl) {
            currentLevel = lvl;
            currentQuestionIdx = 0;
            score = 0;
            document.getElementById('level-select').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const data = quizData[currentLevel][currentQuestionIdx];
            document.getElementById('q-count').innerText = `Question ${currentQuestionIdx + 1}/10`;
            document.getElementById('q-level').innerText = `Level ${currentLevel}`;
            document.getElementById('question-text').innerText = data.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            data.a.forEach((opt, index) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            const correct = quizData[currentLevel][currentQuestionIdx].correct;
            if (selected === correct) score++;

            currentQuestionIdx++;
            if (currentQuestionIdx < 10) {
                showQuestion();
            } else {
                finishLevel();
            }
        }

        function finishLevel() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const passed = score >= 7; // Require 7/10 to pass
            document.getElementById('result-score').innerText = `You scored ${score}/10`;

            if (passed) {
                document.getElementById('result-title').innerText = "🔥 Level Cleared!";
                if (currentLevel === unlockedLevel && unlockedLevel < 10) {
                    unlockedLevel++;
                }
            } else {
                document.getElementById('result-title').innerText = "❌ Try Again";
            }
        }
    </script>
</body>
</html>
