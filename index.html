<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireStreaks: Dragon Master</title>
    <style>
        :root {
            --fire-gold: #ffd700;
            --fire-red: #ff4500;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #230101, #4a0e0e, #800000, #1a0101);
            background-size: 400% 400%;
            animation: fireGradient 12s ease infinite;
            color: white;
            overflow: hidden;
        }

        @keyframes fireGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--fire-gold);
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.4);
            width: 90%;
            max-width: 650px;
            text-align: center;
        }

        .rank-badge {
            color: var(--fire-gold);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
            display: block;
            text-shadow: 0 0 10px var(--fire-red);
        }

        .hidden { display: none; }

        input {
            background: #111;
            border: 1px solid var(--fire-gold);
            color: white;
            padding: 15px;
            width: 80%;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 1.2rem;
            outline: none;
        }

        .btn {
            background: linear-gradient(45deg, #800000, #ff4500);
            border: 1px solid var(--fire-gold);
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--fire-red); }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .lvl-box {
            padding: 15px 5px;
            background: #222;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid #444;
            font-size: 0.8rem;
        }

        .lvl-box.unlocked { background: #600; border-color: var(--fire-gold); }
        .lvl-box.locked { opacity: 0.3; cursor: not-allowed; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .opt-btn {
            background: rgba(255, 255, 255, 0.05);
            padding: 18px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.2s;
        }

        .opt-btn:hover { background: rgba(255, 69, 0, 0.2); border-color: var(--fire-gold); }

        #bar-bg { height: 8px; background: #222; border-radius: 4px; margin: 20px 0; }
        #bar-fill { height: 100%; background: var(--fire-gold); width: 0%; transition: 0.4s; }
    </style>
</head>
<body>

    <div class="container">
        <div id="lobby">
            <h1 style="font-size: 3rem; margin: 0; color: var(--fire-red);">🔥 FIRE STREAKS</h1>
            <p style="color: #aaa; margin-bottom: 30px;">THE 100-QUESTION CHALLENGE</p>
            <input type="text" id="username" placeholder="Warrior Name...">
            <br>
            <button class="btn" onclick="enterLobby()">Enter the Fire</button>
        </div>

        <div id="map" class="hidden">
            <span class="rank-badge" id="current-rank">RANK: SPARK</span>
            <h2 id="greet" style="margin: 0;"></h2>
            <div class="level-grid" id="lvl-btns"></div>
        </div>

        <div id="quiz" class="hidden">
            <div style="display:flex; justify-content: space-between; font-weight: bold;">
                <span id="rank-display" style="color: var(--fire-gold);">LEVEL</span>
                <span id="q-num">1/10</span>
            </div>
            <div id="bar-bg"><div id="bar-fill"></div></div>
            <h2 id="q-text" style="min-height: 80px; font-size: 1.4rem;"></h2>
            <div class="options-grid" id="opts"></div>
        </div>

        <div id="results" class="hidden">
            <h1 id="res-title">LEVEL PASSED!</h1>
            <p id="res-score" style="font-size: 2rem;"></p>
            <button class="btn" onclick="showMap()">Return to Map</button>
        </div>
    </div>

    <script>
        let uName = "";
        let progress = 1;
        let activeLvl = 1;
        let qIdx = 0;
        let score = 0;

        const ranks = ["Spark", "Ember", "Flame", "Blaze", "Cinder Knight", "Pyromancer", "Phoenix Rider", "Dragon Slayer", "Inferno Lord", "DRAGON MASTER"];

            ["What is 400 - 198?", "202", "192", "212", "200", 0],
            ["Speed of light (km/s)?", "150k", "300k", "500k", "1M", 1],

            ["What is 81 × 11?", "891", "811", "881", "901", 0],
            ["What is 72 × 8?", "576", "566", "586", "546", 0],
            ["What is 250% of 40?", "80", "100", "120", "150", 1],
            ["What is 90²?", "8100", "1800", "9000", "7200", 0],
            ["Who discovered penicillin?", "Fleming", "Pasteur", "Curie", "Lister", 0],
            ["What is 1001 - 499?", "502", "512", "492", "522", 0],
            ["What is 36 × 25?", "900", "800", "850", "950", 0],
            ["What is 144 ÷ 6 × 2?", "48", "12", "24", "36", 0],
            ["What is 7³?", "343", "243", "443", "216", 0],
            ["What is 999 × 9?", "8991", "8111", "9991", "8999", 0],
            ["What is 123 × 45?", "5535", "5435", "5635", "5335", 0],
            ["What is 256 × 16?", "4096", "2048", "8192", "4196", 0],
            ["What is 1024 ÷ 32?", "32", "16", "64", "24", 0],
            ["What is 75 × 75?", "5625", "5525", "5725", "6225", 0],
            ["What is 48 × 48?", "2304", "2404", "2204", "2314", 0],
            ["What is 13³?", "2197", "1331", "2297", "2097", 0],
            ["What is 12³?", "1728", "1444", "1828", "1628", 0],
            ["What is 999 × 999?", "998001", "999001", "998011", "997001", 0]
        ];

        // Format into 10 levels of 10
        const levels = [];
        for(let i=0; i<10; i++) levels.push(rawData.slice(i*10, (i+1)*10));

        function enterLobby() {
            uName = document.getElementById('username').value || "Warrior";
            showMap();
        }

        function showMap() {
            document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('map').classList.remove('hidden');
            document.getElementById('greet').innerText = uName;
            document.getElementById('current-rank').innerText = `RANK: ${ranks[progress-1]}`;
            
            const grid = document.getElementById('lvl-btns');
            grid.innerHTML = '';
            for(let i=1; i<=10; i++) {
                const b = document.createElement('div');
                b.className = `lvl-box ${i <= progress ? 'unlocked' : 'locked'}`;
                b.innerHTML = `<small>${ranks[i-1]}</small><br><b>LVL ${i}</b>`;
                if(i <= progress) b.onclick = () => startLvl(i);
                grid.appendChild(b);
            }
        }

        function startLvl(l) {
            activeLvl = l; qIdx = 0; score = 0;
            document.getElementById('map').classList.add('hidden');
            document.getElementById('quiz').classList.remove('hidden');
            document.getElementById('rank-display').innerText = ranks[l-1];
            loadQ();
        }

        function loadQ() {
            const q = levels[activeLvl-1][qIdx];
            document.getElementById('q-num').innerText = `${qIdx+1}/10`;
            document.getElementById('bar-fill').style.width = `${(qIdx/10)*100}%`;
            document.getElementById('q-text').innerText = q[0];
            
            const o = document.getElementById('opts');
            o.innerHTML = '';
            for(let i=1; i<=4; i++) {
                const b = document.createElement('div');
                b.className = 'opt-btn';
                b.innerText = q[i];
                b.onclick = () => {
                    if((i-1) === q[5]) score++;
                    qIdx++;
                    if(qIdx < 10) loadQ(); else finish();
                };
                o.appendChild(b);
            }
        }

        function finish() {
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            const pass = score >= 8;
            document.getElementById('res-title').innerText = pass ? "🔥 LEVEL ASCENDED!" : "💀 FAILED (Get 8/10)";
            document.getElementById('res-score').innerText = `${score}/10`;
            if(pass && activeLvl === progress && progress < 10) progress++;
        }
    </script>
</body>
</html>
